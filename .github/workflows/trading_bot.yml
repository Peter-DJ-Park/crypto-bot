name: 암호화폐 분석봇 (무한매수법)

on:
  schedule:
    # 매일 KST 오전 9시 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4.2.2

      - name: Python 설정
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 한국어 폰트 설치
        run: |
          sudo apt-get install -y fonts-nanum
          fc-cache -fv

      - name: state.json 복원
        run: |
          STATE='${{ secrets.STATE_JSON }}'
          if [ -z "$STATE" ] || [ "$STATE" = "null" ] || [ "$STATE" = "" ]; then
            echo '{"ticker":"","cycle":1,"slot":0,"avg_price":0.0,"total_qty":0.0,"total_cost":0.0}' > state.json
            echo "⚠️ 새 state.json 생성"
          else
            echo "$STATE" > state.json
            echo "✅ state.json 복원 완료"
          fi
          cat state.json

      - name: 봇 실행
        run: python main.py
        env:
          BITHUMB_ACCESS:      ${{ secrets.BITHUMB_ACCESS }}
          BITHUMB_SECRET:      ${{ secrets.BITHUMB_SECRET }}
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHATID:     ${{ secrets.TELEGRAM_CHATID }}

      - name: state.json → Secrets 자동 저장
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f state.json ]; then
            echo "✅ 저장할 state.json:"
            cat state.json
            gh secret set STATE_JSON < state.json
            echo "✅ STATE_JSON Secrets 업데이트 완료!"
          fi
