name: 암호화폐 분석봇 (무한매수법)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 한국어 폰트 설치
        run: |
          sudo apt-get install -y fonts-nanum
          fc-cache -fv

      - name: state.json 복원
        run: |
          echo '${{ secrets.STATE_JSON }}' > state.json
          echo "✅ 복원된 state.json:"
          cat state.json

      - name: 봇 실행
        run: python main.py
        env:
          BITHUMB_ACCESS:      ${{ secrets.BITHUMB_ACCESS }}
          BITHUMB_SECRET:      ${{ secrets.BITHUMB_SECRET }}
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHATID:     ${{ secrets.TELEGRAM_CHATID }}

      - name: state.json 자동 저장
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f state.json ]; then
            echo "✅ state.json 저장 중..."
            cat state.json
            gh secret set STATE_JSON < state.json
            echo "✅ Secrets 업데이트 완료!"
          fi