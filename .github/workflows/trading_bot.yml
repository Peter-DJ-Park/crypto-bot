name: 암호화폐 분석봇 (무한매수법)

on:
  schedule:
    # 매일 KST 오전 9시 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:    # 수동 실행 버튼

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 한국어 폰트 설치 (차트용)
        run: |
          sudo apt-get install -y fonts-nanum
          fc-cache -fv

      - name: state.json 복원 (이전 매매 상태 유지)
        run: |
          if [ -n "${{ secrets.STATE_JSON }}" ]; then
            echo '${{ secrets.STATE_JSON }}' > state.json
            echo "✅ state.json 복원 완료"
          else
            echo "{}" > state.json
            echo "⚠️ 새로운 state.json 생성"
          fi

      - name: 봇 실행
        run: python main.py
        env:
          BITHUMB_ACCESS:     ${{ secrets.BITHUMB_ACCESS }}
          BITHUMB_SECRET:     ${{ secrets.BITHUMB_SECRET }}
          NAVER_CLIENT_ID:    ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHATID:    ${{ secrets.TELEGRAM_CHATID }}

      - name: state.json 저장 (다음 실행을 위해)
        if: always()
        run: |
          if [ -f state.json ]; then
            STATE=$(cat state.json)
            echo "STATE_JSON=${STATE}" >> $GITHUB_ENV
            echo "✅ state.json 저장 완료: ${STATE}"
          fi

      # ※ state.json을 Secrets에 자동 업데이트하려면
      #   gh CLI + PAT 토큰 설정이 추가로 필요합니다.
      #   수동으로 GitHub > Settings > Secrets > STATE_JSON 업데이트 가능
